<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

<header class="fixed top-0 left-0 right-0 z-50 font-['Inter',sans-serif]">

  <div class="bg-[#09090b]/80 backdrop-blur-xl border-b border-white/[0.05]">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-8 h-16 flex items-center justify-between">

      <div class="flex items-center gap-10">
        <a routerLink="/" class="flex items-center gap-2.5 group transition-transform active:scale-95">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z" />
            </svg>
          </div>
          <span class="font-['Space_Grotesk',sans-serif] text-white text-xl font-bold tracking-tight">SystemCRM</span>
        </a>
      </div>

      <div class="flex items-center gap-3">

        <a *ngIf="isAdmin()"
           routerLink="/admin"
           class="hidden md:flex items-center gap-1.5 px-3 py-1 bg-amber-500/10 border border-amber-500/20 text-amber-400 text-[10px] font-bold uppercase tracking-wider rounded-full">
          <span class="w-1 h-1 rounded-full bg-amber-400 animate-pulse"></span>
          Admin
        </a>

        <div class="hidden md:block w-px h-4 bg-white/10 mx-2"></div>

        <ng-container *ngIf="isLoggedIn()">
          <div class="flex items-center gap-2">
            <a routerLink="/account" class="flex items-center gap-3 p-1.5 pr-4 hover:bg-white/5 rounded-full transition-all group border border-transparent hover:border-white/10">
              <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-[11px] font-bold text-white uppercase shadow-inner">
                {{ username()?.charAt(0) || 'U' }}
              </div>
              <div class="hidden sm:block text-left">
                <p class="text-xs font-semibold text-white leading-tight truncate max-w-[80px]">{{ username() }}</p>
                <p class="text-[10px] text-gray-500 leading-tight">Membre Pro</p>
              </div>
            </a>
            <button (click)="onLogout()"
                    class="p-2 text-gray-500 hover:text-red-400 transition-colors rounded-lg hover:bg-red-400/10"
                    title="Déconnexion">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
              </svg>
            </button>
          </div>
        </ng-container>

        <ng-container *ngIf="!isLoggedIn()">
          <a routerLink="/login" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 transition-colors">
            Connexion
          </a>
          <a routerLink="/register" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
            Essai gratuit
          </a>
        </ng-container>

        <button (click)="toggleMenu()" class="lg:hidden p-2 text-gray-400 hover:text-white transition-colors">
          <svg *ngIf="!menuOpen()" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5" />
          </svg>
          <svg *ngIf="menuOpen()" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

      </div>
    </div>
  </div>

  <div *ngIf="menuOpen()" class="lg:hidden bg-[#09090b] border-b border-white/5 animate-in slide-in-from-top duration-300">
    <nav class="flex flex-col p-4 gap-1">
      <div class="h-px bg-white/5 my-2"></div>

      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" (click)="closeMenu()" class="p-4 text-indigo-400 font-semibold">Connexion</a>
        <a routerLink="/register" (click)="closeMenu()" class="m-2 p-4 bg-indigo-600 text-white text-center rounded-xl font-bold">Essai gratuit</a>
      </ng-container>

      <ng-container *ngIf="isLoggedIn()">
        <a routerLink="/account" (click)="closeMenu()" class="p-4 text-gray-400 font-medium">Mon Profil</a>
        <button (click)="onLogout(); closeMenu()" class="p-4 text-left text-red-400 font-medium">Déconnexion</button>
      </ng-container>
    </nav>
  </div>

</header>
