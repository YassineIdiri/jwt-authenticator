<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />

<div class="min-h-screen flex bg-[#09090b] font-['Inter',sans-serif] selection:bg-indigo-500/30">

  <div class="flex-1 flex items-center justify-center px-6 py-12 lg:px-20">
    <div class="w-full max-w-sm">

      <div class="mb-10">
        <h1 class="font-['Space_Grotesk',sans-serif] text-white text-3xl font-bold mb-3">Sign in</h1>
        <p class="text-gray-400 text-sm font-light">Welcome back to your console.</p>
      </div>

      <div *ngIf="reasonMessage()" class="mb-6 flex items-start gap-3 bg-indigo-500/10 border border-indigo-500/20 rounded-xl px-4 py-3 text-indigo-300 text-sm">
        {{ reasonMessage() }}
      </div>

      <div *ngIf="serverError()" class="mb-6 flex items-start gap-3 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 text-red-300 text-sm font-medium">
        {{ serverError() }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-6">

        <div class="space-y-2">
          <label class="block text-gray-400 text-xs font-semibold uppercase tracking-wider">Username</label>
          <input
            formControlName="username"
            type="text"
            placeholder="Username"
            class="w-full bg-[#121214] border text-white text-sm px-4 py-3.5 rounded-xl outline-none transition-all focus:ring-2 focus:ring-indigo-500/20"
            [class.border-white/5]="!isInvalid('username')"
          [class.border-red-500/50]="isInvalid('username')"
          />
          <p *ngIf="hasError('username','required')" class="text-red-400 text-[11px]">Username is required</p>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Password</label>
            <a href="#" class="text-indigo-400 text-xs hover:text-indigo-300 transition-colors">Forgot?</a>
          </div>
          <div class="relative">
            <input
              formControlName="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full bg-[#121214] border text-white text-sm px-4 py-3.5 pr-12 rounded-xl outline-none transition-all focus:ring-2 focus:ring-indigo-500/20"
              [class.border-white/5]="!isInvalid('password')"
            [class.border-red-500/50]="isInvalid('password')"
            />
            <button type="button" (click)="toggleShowPassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
              <svg *ngIf="!showPassword()" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg *ngIf="showPassword()" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65"/></svg>
            </button>
          </div>
          <p *ngIf="hasError('password','required')" class="text-red-400 text-[11px]">Password is required</p>
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-4 bg-indigo-600 text-white text-sm font-bold rounded-xl transition-all hover:bg-indigo-700 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-3"
        >
          <span *ngIf="!loading()">Sign in</span>
          <div *ngIf="loading()" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>

      </form>

      <div class="flex items-center gap-4 my-8">
        <div class="flex-1 h-px bg-white/5"></div>
        <span class="text-gray-600 text-[10px] font-bold uppercase tracking-widest">or</span>
        <div class="flex-1 h-px bg-white/5"></div>
      </div>

      <button type="button" (click)="loginWithGoogle()" [disabled]="loading()" class="w-full py-3.5 bg-white/5 border border-white/5 text-white text-sm font-medium rounded-xl hover:bg-white/10 transition-all flex items-center justify-center gap-3">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        </svg>
        Google
      </button>

      <p class="mt-10 text-center text-gray-500 text-sm font-light">
        New here? <a routerLink="/register" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">Create an account</a>
      </p>

    </div>
  </div>

  <div class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-16 overflow-hidden border-r border-white/5">

    <div class="absolute inset-0 bg-[#09090b]"></div>
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-600/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[150px]"></div>
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 32px 32px;"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </div>
        <span class="font-['Space_Grotesk',sans-serif] text-white text-2xl font-bold tracking-tight">SystemCRM</span>
      </div>
    </div>

    <div class="relative z-10 max-w-md">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 mb-6">
        <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
        <span class="text-white/60 text-[10px] uppercase tracking-widest font-medium">CRM Platform v.2</span>
      </div>
      <h2 class="font-['Space_Grotesk',sans-serif] text-white text-5xl font-bold leading-tight mb-6">
        Manage your clients <br/>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">without friction.</span>
      </h2>
      <p class="text-gray-400 text-lg font-light leading-relaxed">
        Secured with JWT and Google OAuth2
      </p>
    </div>

    <div class="relative z-10 flex items-center gap-4 text-white/30 text-xs tracking-widest uppercase">
      <span class="w-8 h-px bg-white/20"></span>
      Secure authentication
    </div>
  </div>

</div>
