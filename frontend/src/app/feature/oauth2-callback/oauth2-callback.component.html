<div class="min-h-screen bg-[#0e0e0e] flex items-center justify-center font-['DM_Sans',sans-serif]">
  <div class="flex flex-col items-center gap-6 text-center px-6">

    <!-- Loading -->
    <ng-container *ngIf="!error()">
      <div class="relative w-12 h-12">
        <div class="absolute inset-0 rounded-full border border-white/10"></div>
        <div class="absolute inset-0 rounded-full border border-t-white/60 animate-spin"></div>
      </div>
      <div>
        <p class="text-white/60 text-sm tracking-widest uppercase mb-1">Connexion en cours</p>
        <p class="text-white/25 text-xs">Finalisation via Google…</p>
      </div>
    </ng-container>

    <!-- Erreur -->
    <ng-container *ngIf="error()">
      <div class="w-12 h-12 border border-red-800/50 rounded-sm flex items-center justify-center">
        <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
      </div>
      <div>
        <p class="text-red-300 text-sm mb-4">{{ error() }}</p>
        <a href="/login"
           class="text-white/30 hover:text-white text-xs tracking-widest uppercase transition-colors border-b border-white/20 hover:border-white/50 pb-px">
          Retour à la connexion
        </a>
      </div>
    </ng-container>

  </div>
</div>
