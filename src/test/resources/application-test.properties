# Flyway tourne normalement ? on teste avec la vraie DB schema
spring.flyway.enabled=true

# Pas de logs SQL parasites pendant les tests
spring.jpa.show-sql=false

# Overrides JWT/OAuth2 pour les tests ? valeurs fixes et prťvisibles
app.jwt.secret=dGVzdC1zZWNyZXQtcG91ci1sZXMtdGVzdHMtdW5pdGFpcmVzLWp3dC1hdXRoZW50aWNhdG9y
app.jwt.expiration=900000
app.jwt.issuer=test-issuer
app.jwt.audience=test-api

app.security.refresh.token-pepper=test-pepper-for-tests-only

app.oauth2.redirect-uri=http://localhost:4200/oauth2/callback
app.oauth2.allowed-redirect-uris=http://localhost:4200/oauth2/callback
app.oauth2.code-ttl-seconds=30

# Google OAuth2 ? fake credentials pour les tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

logging.level.org.springframework.security=WARN

# ===== Refresh Token =====
app.security.refresh.days=7
app.security.refresh.remember-days=30
app.security.refresh.rotate=true
app.security.refresh.max-active-sessions=5

# ===== Refresh Cookie =====
app.security.refresh.cookie-name=refresh_token
app.security.refresh.cookie-path=/api/auth
app.security.refresh.secure=false
app.security.refresh.same-site=Lax

# ===== Public Paths =====
app.security.public-paths.exact=/api/auth/login,/api/auth/register,/api/auth/refresh,/api/auth/logout,/api/auth/logout-all,/api/auth/oauth2/exchange,/api/auth/oauth2/failure
app.security.public-paths.prefixes=/oauth2/,/login/oauth2/,/swagger-ui,/v3/api-docs

