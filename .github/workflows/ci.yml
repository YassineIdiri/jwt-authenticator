name: CI

on:
  pull_request:
  push:
    branches: [ "master", "main" ]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    # ✅ Supprimé : services.postgres — Testcontainers démarre son propre container

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + tests
        run: mvn -B -ntp clean verify
        env:
          SPRING_PROFILES_ACTIVE: test
          # JWT
          APP_JWT_SECRET: dGVzdC1zZWNyZXQtcG91ci1sZXMtdGVzdHMtdW5pdGFpcmVzLWp3dC1hdXRoZW50aWNhdG9y
          # Refresh token
          REFRESH_TOKEN_PEPPER: test-pepper-ci
          # Google OAuth2 — fake credentials, jamais les vraies en CI
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test